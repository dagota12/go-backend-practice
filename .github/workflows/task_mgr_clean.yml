# .github/workflows/task_mgr_clean.yml
name: Task Manager Clean CI

on:
  push:
    paths:
      - "task_mgr_clean/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "task_mgr_clean/**"

jobs:
  test-task-mgr-clean:
    runs-on: ubuntu-latest

    env:
      DB_URI: ${{ secrets.DB_URI }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      EXP_TIME: ${{ secrets.JWT_EXP }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.22.5 # Adjust to your Go version

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod tidy
        working-directory: ./task_mgr_clean

      - name: Run tests
        run: go test -v ./...
        working-directory: ./task_mgr_clean
