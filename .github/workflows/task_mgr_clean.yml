# .github/workflows/task_mgr_clean.yml
name: Task Manager Clean CI

on:
  push:
    paths:
      - "task_mgr_clean/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "task_mgr_clean/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22.5"
          working-directory: task_mgr_clean

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod tidy
        working-directory: task_mgr_clean

      - name: Run tests
        env:
          DB_URI: ${{ secrets.DB_URI }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: go test -v ./...
        working-directory: task_mgr_clean

      - name: Build project
        run: go build ./...
        working-directory: task_mgr_clean
