name: Task Manager Clean

on:
  push:
    paths:
      - "task_mgr_clean/**"
  pull_request:
    paths:
      - "task_mgr_clean/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20

      - name: Run tests
        working-directory: ./task_mgr_clean
        run: go test -v ./...

      - name: Build project
        working-directory: ./task_mgr_clean
        run: go build ./...
